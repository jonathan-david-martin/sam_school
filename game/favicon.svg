<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark space background -->
  <rect width="32" height="32" rx="6" fill="#0a0a1a"/>
  <!-- Sun glow -->
  <circle cx="8" cy="8" r="5" fill="#ffdc32" opacity="0.3"/>
  <circle cx="8" cy="8" r="3.5" fill="#ffdc32"/>
  <!-- Planet with green habitable side -->
  <circle cx="20" cy="18" r="9" fill="#2a6ae0"/>
  <path d="M20 9a9 9 0 0 1 0 18" fill="#3cb850"/>
  <!-- Atmosphere ring -->
  <circle cx="20" cy="18" r="11" fill="none" stroke="#64e0ff" stroke-width="0.8" opacity="0.5"/>
  <!-- Small star dots -->
  <circle cx="4" cy="22" r="0.8" fill="#fff" opacity="0.7"/>
  <circle cx="28" cy="5" r="0.8" fill="#fff" opacity="0.7"/>
  <circle cx="14" cy="4" r="0.6" fill="#fff" opacity="0.5"/>
  <circle cx="27" cy="27" r="0.6" fill="#fff" opacity="0.5"/>
</svg>
